name: Generate Organization Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Organization Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: UATAS-BetaTeam
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          
          # ============================================
          # LANGUAGES (works fine for orgs)
          # ============================================
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # ============================================
          # ACTIVITY (works fine for orgs)
          # ============================================
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: all
          
          # ============================================
          # FOLLOWUP — ISSUES & PRs (only from members, NOT communities)
          # ============================================
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_followup_archived: yes
          
          # ============================================
          # STARGAZERS — WITHOUT Google Maps (clean version)
          # ============================================
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_charts: yes
          plugin_stargazers_days: 14
          # REMOVED: plugin_stargazers_worldmap (requires Google Maps API key)
          
          # ============================================
          # CONTRIBUTORS (works fine for orgs)
          # ============================================
          plugin_contributors: yes
          plugin_contributors_base: ""
          plugin_contributors_head: main
          plugin_contributors_ignored: github-actions[bot], dependabot[bot]
          plugin_contributors_contributions: commits, pull_requests, issues
          
          # ============================================
          # REPOSITORIES LIST (pinned repos, works for orgs)
          # ============================================
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_featured: ""
          plugin_repositories_starred: 0
          plugin_repositories_random: 0
          plugin_repositories_forks: yes
          plugin_repositories_affiliations: organization_member
          
          # ============================================
          # GENERAL CONFIG
          # ============================================
          config_timezone: UTC
          config_twemoji: yes
          config_display: large
          config_animations: yes
          
          # Clean layout order (no stars plugin, no worldmap)
          config_order: header, repositories, activity, languages, followup, stargazers, contributors
          
          output_action: commit
          committer_message: "chore: update org metrics"
          committer_token: ${{ secrets.GITHUB_TOKEN }}
