name: Generate Organization Metrics

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Organization Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: UATAS-BetaTeam
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          
          # ============================================
          # VISUAL STYLING — Makes it look much cleaner
          # ============================================
          # Use columns layout for better desktop/mobile fit
          config_display: columns
          # Consistent emoji rendering across all platforms
          config_twemoji: yes
          # Enable smooth CSS animations
          config_animations: yes
          # Better padding to prevent cropping/oversizing
          config_padding: 0, 6 + 8%
          # Self-contained SVG (no external image links)
          config_base64: yes
          
          # ============================================
          # LANGUAGES
          # ============================================
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # ============================================
          # ACTIVITY
          # ============================================
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: all
          
          # ============================================
          # FOLLOWUP — Issues & PRs (only org repos, no communities)
          # ============================================
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_followup_archived: yes
          
          # ============================================
          # CONTRIBUTORS
          # ============================================
          plugin_contributors: yes
          plugin_contributors_base: ""
          plugin_contributors_head: main
          plugin_contributors_ignored: github-actions[bot], dependabot[bot]
          plugin_contributors_contributions: commits, pull_requests, issues
          
          # ============================================
          # REPOSITORIES — Pinned only (no featured/starred to avoid errors)
          # ============================================
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_featured: ""
          plugin_repositories_starred: 0
          plugin_repositories_random: 0
          plugin_repositories_forks: yes
          plugin_repositories_affiliations: organization_member
          
          # ============================================
          # CUSTOM CSS — Extra polish for a premium look
          # ============================================
          extras_css: |
            /* Premium dark theme styling */
            svg {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif !important;
            }
            /* Section headers styling */
            h2 {
              font-size: 16px !important;
              font-weight: 600 !important;
              letter-spacing: 0.3px !important;
              margin-bottom: 12px !important;
            }
            /* Better spacing between sections */
            .section {
              margin-bottom: 24px !important;
            }
            /* Refined card-like feel for repo items */
            .repository {
              border-radius: 8px !important;
              padding: 8px 12px !important;
              margin: 4px 0 !important;
              transition: all 0.2s ease !important;
            }
            /* Language bar styling */
            .language {
              border-radius: 4px !important;
            }
            /* Smooth hover effects */
            .repository:hover {
              background: rgba(255,255,255,0.05) !important;
            }
            /* Better typography for stats */
            .metric {
              font-variant-numeric: tabular-nums !important;
            }
          
          # ============================================
          # LAYOUT ORDER — Clean, logical flow
          # ============================================
          config_order: header, repositories, activity, languages, followup, contributors
          
          # ============================================
          # OUTPUT
          # ============================================
          output_action: commit
          committer_message: "chore: update org metrics"
          committer_token: ${{ secrets.GITHUB_TOKEN }}
